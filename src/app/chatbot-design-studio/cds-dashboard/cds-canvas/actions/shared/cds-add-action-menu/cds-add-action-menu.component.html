<!-- ── Search ───────────────────────────────────────────────────────────────── -->
<div class="lib-head">
  <div class="search">
    <svg class="i" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>
    </svg>
    <input #search
           type="text"
           placeholder="{{ 'Search' | translate }}"
           [(ngModel)]="actionToSearch"
           (ngModelChange)="onSearchAction($event)">
  </div>
</div>

<!-- ── Actions list ─────────────────────────────────────────────────────────── -->
<div class="lib-body" (wheel)="$event.stopPropagation()">
  <div *ngFor="let item of filterMenuItemsList"
       class="lib-item"
       (click)="onAddActionFromActionMenu(item)">

    <div class="lib-icon">
      <mat-icon class="lib-svg-icon" [svgIcon]="item.value.src" aria-hidden="true"></mat-icon>
    </div>

    <div class="lib-name">{{ item.value.name | translate }}</div>

  </div>
</div>
