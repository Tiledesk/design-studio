<div class="button-reply-wrp" [class.previewMode]="previewMode">

    <div class="button-reply">

        <!-- delete — visible on hover, absolute top-left -->
        <button *ngIf="!previewMode"
            class="btn-ctrl btn-ctrl--delete"
            (click)="$event.stopPropagation(); onDeleteButton()"
            title="Delete">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:11px;height:11px"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        </button>

        <!-- label -->
        <span class="button-reply__label">
            <span *ngIf="button?.target !== 'self' && button?.type === TYPE_BUTTON.URL" class="icon-button-action">
                <svg style="transform:rotateZ(45deg)" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14"><path d="M0 0h24v24H0z" fill="none"/><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
            </span>
            <span *ngIf="button?.target === 'self' && button?.type === TYPE_BUTTON.URL" class="icon-button-action-self">
                <svg style="transform:rotateZ(90deg)" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14"><path d="M0 0h24v24H0z" fill="none"/><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
            </span>
            {{button?.value}}
        </span>

        <!-- move right — visible on hover, absolute top-right -->
        <button *ngIf="!previewMode && !isLast"
            class="btn-ctrl btn-ctrl--move"
            (click)="$event.stopPropagation(); onMoveRightButton()"
            title="Move right">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:11px;height:11px"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/></svg>
        </button>

    </div>

</div>
