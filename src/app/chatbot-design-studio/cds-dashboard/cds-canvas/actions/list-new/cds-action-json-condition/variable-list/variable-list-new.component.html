<div class="picker" aria-label="Insert variable">

    <!-- ─── Search ───────────────────────────────────────────── -->
    <div class="pk-search">
        <svg class="s-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text"
               [placeholder]="'CDSCanvas.TypeSearchValue' | translate"
               [(ngModel)]="textVariable"
               (ngModelChange)="onChangeSearch($event)" />
    </div>

    <!-- ─── List ─────────────────────────────────────────────── -->
    <div class="pk-list" #variableListScroll>

        <!-- User defined -->
        <ng-container *ngIf="filteredVariableList && filteredVariableList[0]?.elements?.length > 0">
            <button type="button"
                    class="pk-section"
                    [class.collapsed]="collapsed.userDefined"
                    (click)="toggleSection('userDefined')">
                <span>{{ 'CDSvariablesList.' + filteredVariableList[0].key | translate }}</span>
                <span class="count">{{ filteredVariableList[0].elements.length }}</span>
                <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="6 9 12 15 18 9"/>
                </svg>
            </button>
            <ng-container *ngIf="!collapsed.userDefined">
                <div *ngFor="let variable of filteredVariableList[0].elements"
                     tabindex="0"
                     class="opt user-defined"
                     (click)="onVariableSelected(variable)"
                     (keydown.enter)="onVariableSelected(variable)">
                    <span class="type-ico">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M8 4c-3 0-3 4-3 8s0 8 3 8"/><path d="M16 4c3 0 3 4 3 8s0 8-3 8"/>
                        </svg>
                    </span>
                    <span class="name">{{ variable?.name }}</span>
                    <button type="button"
                            class="row-act danger"
                            title="Delete"
                            (click)="$event.stopPropagation(); onVariableDelete(variable)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                             stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                            <path d="M10 11v6"/><path d="M14 11v6"/>
                        </svg>
                    </button>
                </div>
            </ng-container>
        </ng-container>

        <!-- System defined (intent variables) -->
        <ng-container *ngFor="let item of filteredIntentVariableList; let index = index">
            <ng-container *ngIf="item && item.elements.length > 0">
                <button type="button"
                        class="pk-section"
                        [class.collapsed]="isSectionCollapsed(item.key, index)"
                        (click)="toggleSection(item.key)">
                    <span>{{ 'CDSvariablesList.' + item.key | translate }}</span>
                    <span class="count">{{ item.elements.length }}</span>
                    <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <polyline points="6 9 12 15 18 9"/>
                    </svg>
                </button>
                <ng-container *ngIf="!isSectionCollapsed(item.key, index)">
                    <div *ngFor="let variable of item.elements"
                         tabindex="0"
                         class="opt"
                         (click)="onVariableSelected(variable)"
                         (keydown.enter)="onVariableSelected(variable)">
                        <span class="type-ico">
                            <span class="material-icons" aria-hidden="true">{{ variable?.icon || 'data_object' }}</span>
                        </span>
                        <span class="name">{{ variable?.name }}</span>
                        <button *ngIf="variable?.description"
                                type="button"
                                class="row-act"
                                title="Info"
                                matTooltipClass="cds-mat-tooltip"
                                matTooltip="{{ variable?.description | translate: BRAND_BASE_INFO }}"
                                matTooltipPosition="left"
                                matTooltipHideDelay="100"
                                (click)="$event.stopPropagation()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                                 stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="9"/>
                                <line x1="12" y1="11" x2="12" y2="16"/>
                                <circle cx="12" cy="8" r="0.6" fill="currentColor"/>
                            </svg>
                        </button>
                    </div>
                </ng-container>
            </ng-container>
        </ng-container>

        <!-- Globals -->
        <ng-container *ngIf="filteredGlobalsList && filteredGlobalsList[0]?.elements?.length > 0">
            <button type="button"
                    class="pk-section"
                    [class.collapsed]="collapsed.globals"
                    (click)="toggleSection('globals')">
                <span>{{ 'CDSvariablesList.' + filteredGlobalsList[0].key | translate }}</span>
                <span class="count">{{ filteredGlobalsList[0].elements.length }}</span>
                <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="6 9 12 15 18 9"/>
                </svg>
            </button>
            <ng-container *ngIf="!collapsed.globals">
                <div *ngFor="let variable of filteredGlobalsList[0].elements"
                     tabindex="0"
                     class="opt"
                     (click)="onVariableSelected(variable)"
                     (keydown.enter)="onVariableSelected(variable)">
                    <span class="type-ico">
                        <span class="material-icons" aria-hidden="true">lock</span>
                    </span>
                    <span class="name">{{ variable?.name }}</span>
                </div>
            </ng-container>
        </ng-container>

        <!-- Empty state -->
        <div class="pk-empty" *ngIf="isEmpty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="11" cy="11" r="7"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <span class="text">{{ 'CDSCanvas.NoVariableFound' | translate }}</span>
        </div>
    </div>

    <!-- ─── Footer ───────────────────────────────────────────── -->
    <div class="pk-foot">
        <button class="add-custom" type="button" (click)="onAddCustomAttribute()">
            <svg class="i" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            {{ 'CDSCanvas.AddCustomAttributes' | translate }}
        </button>
    </div>

</div>
