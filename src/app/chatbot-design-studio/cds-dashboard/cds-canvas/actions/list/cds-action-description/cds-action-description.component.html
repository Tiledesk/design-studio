        </div>

    <div class="section">
        <div class="action-title tds_draggable">
            <div class="icon-action tds_draggable">
                <img class="active-icon tds_draggable" [src]="element?.src" [title]="element?.name | translate ">
                <!-- <span *ngIf="previewMode && element.badge" [class.deprecation-badge]="element.badge==='DEP'" class="trigger-beta-badge">{{element.badge}}</span> -->
                <span *ngIf="previewMode && element?.badge" [class]="'trigger-beta-badge badge-' + element?.badge">{{element?.badge}}</span>
            </div>

            <p *ngIf="!previewMode" class="label-action">{{element?.name | translate }}</p>
            <!-- <span *ngIf="!previewMode && element.badge" [class.deprecation-badge]="element.badge==='DEP'" class="trigger-beta-badge">{{element.badge}}</span> -->
            <span *ngIf="!previewMode && element?.badge" [class]="'trigger-beta-badge badge-' + element?.badge">{{element?.badge}}</span>
            <span *ngIf="!previewMode && element?.status ==='beta'" class="trigger-beta-badge">Beta</span>

            <!-- drag_indicator rimosso da qui: il handle di riordino è renderizzato dal parent (cds-intent)
                 come unico cdkDragHandle, così SOLO quel pulsante riordina l'azione. -->

        </div>
        
        <div *ngIf="showTip" class="action-description">
            <div *ngIf="element?.doc"
                [satPopoverAnchor]="descriptionTooltip"
                (click)="descriptionTooltip.toggle()">
                <span class="material-icons-outlined">info</span>
            </div>
        
            <div [innerHtml]="tipText"></div>
        
            <!-- **** _tdActionTitle **** -->
            <!-- <input class="action-input"
                 [ngModel]="dataInput"
                 [placeholder]="titlePlaceholder"
                (input)="onChangeText($event.target.value)"/>
                (input)="onChangeText($event.target.value)"/> -->

        </div>
    </div>

    <div *ngIf="!previewMode && element?.badge ==='DEP'"
        class="deprecation-message"
        [innerHTML]="'CDSCanvas.DeprecationMessage' | translate:{
            aiPrompt: ('CDSActionList.NAME.AiPrompt' | translate),
            aiPromptUrl: ('https://guide.tiledesk.com/ai-chatbots-and-automation/actions-explained/ai-prompt-multi-llm')
        }">
        
    </div>

</div>

<sat-popover #descriptionTooltip id="descriptionTooltip" 
    hasBackdrop 
    verticalAlign="center" 
    horizontalAlign="after" 
    (backdropClicked)="descriptionTooltip.close()" 
    panelClass="description-tooltip">
    <div class="tooltip-wrp">
        <div class="caret_tooltip"></div>
        <span [innerHTML]="element?.doc+'.DESCRIPTION' | translate: tparams"></span>
        <span *ngIf="BRAND_BASE_INFO['DOCS']" [innerHTML]="element?.doc+'.DOC_URL' | translate: tparams"></span>
   </div>
</sat-popover>
