<div class="tpl-modal-box">
    <div class="tpl-modal-header">
        <div class="tpl-modal-header-text">
            <span>{{'CDSCanvas.TiledeskTools' | translate}}</span>
        </div>
        <i text-color="light" class="material-icons cds-close-btn-icon" [mat-dialog-close]="false">close</i>
    </div>

    <hr class="custom-hr mcp-dialog__hr">

    <div class="search-section">
        <div class="server-count">
            {{'CDSCanvas.TotalMCPServers' | translate}}: <span class="count-number">{{ filteredServers.length }}</span>
        </div>
        <div class="search-input-wrapper">
            <input
                type="text"
                class="search-input"
                [(ngModel)]="searchFilter"
                (input)="onSearchChange()"
                [placeholder]="'CDSCanvas.SearchByNameURLOrType' | translate">
            <span class="material-icons search-icon">search</span>
        </div>
    </div>

    <div class="tpl-modal-content">
        <div *ngIf="isLoading" class="empty-state">
            <span class="material-icons empty-icon">hourglass_empty</span>
            <p class="empty-message">{{'CDSCanvas.LoadingTools' | translate}}...</p>
        </div>

        <div *ngIf="showError && !isLoading" class="empty-state">
            <span class="material-icons empty-icon">error_outline</span>
            <p class="empty-message">{{ errorMessage }}</p>
        </div>

        <div *ngIf="!isLoading && !showError" class="mcp-servers-list">
            <div *ngIf="filteredServers.length === 0" class="empty-state">
                <span class="material-icons empty-icon">cloud_off</span>
                <p class="empty-message">{{'CDSCanvas.NoMCPServerConfigured' | translate}}</p>
            </div>

            <div class="mcp-server-item-wrapper" *ngFor="let server of filteredServers">
                <button class="mcp-server-item" type="button" (click)="onSelectNative(server)">
                    <div class="server-info">
                        <div class="server-name">
                            {{ server.name }}
                            <span class="mcp-server__status-badge mcp-server__status-badge--native">
                                {{'CDSCanvas.Native' | translate}}
                            </span>
                            <span *ngIf="isConfigured(server)" class="mcp-server__status-badge mcp-server__status-badge--active">
                                {{'CDSCanvas.Active' | translate}}
                            </span>
                        </div>
                        <div *ngIf="server.description" class="server-url">{{ server.description }}</div>
                        <div class="server-type">{{ server.transport }}</div>
                    </div>
                    <span class="material-icons">chevron_right</span>
                </button>
            </div>
        </div>
    </div>

    <div class="tpl-modal-buttons">
        <button id="cds-ok-btn" class="btn btn-primary cds-blue-button" type="button" [mat-dialog-close]="false">
            {{'CDSCanvas.Close' | translate}}
        </button>
    </div>
</div>
