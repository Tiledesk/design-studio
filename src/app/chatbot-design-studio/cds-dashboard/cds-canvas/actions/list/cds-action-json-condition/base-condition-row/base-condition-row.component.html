<!-- Step 0: lista variabili -->
<div *ngIf="step===0">
    <variable-list
        [variableListUserDefined]="variableListUserDefined"
        [variableListSystemDefined]="variableListSystemDefined"
        (onSelected)="onSelectedAttribute($event, 0)">
    </variable-list>
</div>

<!-- Step 1: form condizione (operandi, operatore, valore) -->
<div class="step2" *ngIf="step===1">
    <form class="filter-item-drop-down" [formGroup]="conditionForm" (submit)="onSubmitCondition()">
        <section class="header">
            <span class="material-icons">data_object</span>
            <label class="category-row-name">{{'CDSCanvas.CustomAttribute' | translate }}</label>
            <span class="material-icons" (click)="onClose()">close</span>
        </section>
        <hr class="custom-hr" style="margin-top:3px; margin-bottom:3px">
        <section class="attribute">
            <div class="attribute-label">
                {{'CDSCanvas.AttributeName' | translate }}
                <span class="material-icons-outlined attribute-info-icon"
                    matTooltipClass="cds-mat-tooltip cds-mat-tooltip-multiline"
                    matTooltipPosition="above"
                    [matTooltip]="'CDSCanvas.AttributeNameSyntaxHelp' | translate">info</span>
            </div>
            <div class="operand-attribute">
                <cds-textarea id="operand1"
                    [textLimitBtn]="false"
                    [emojiPikerBtn]="false"
                    [isLiquidjs]="false"
                    [setAttributeBtn]="!conditionForm.value.operand1"
                    [wrapAttributeWithBraces]="false"
                    [minRow]="1" [maxRow]="1"
                    [readonly]="false"
                    [placeholder]="'AttributeName' | translate"
                    [control]="conditionForm.get('operand1')"
                    (selectedAttribute)="onSelectedAttributeOperand1($event)"
                    (changeTextarea)="onChangeOperand1($event)">
                </cds-textarea>
            </div>
        </section>
        
        <section class="condition">
            <div>{{'CDSCanvas.Condition' | translate }}</div>
            <div class="operators-list">
                <cds-select
                    [items]="operatorsList"
                    [bindLabelSelect]="'name'"
                    [bindValueSelect]="'type'"
                    [groupByKey]="'group'"
                    [searchable]="true"
                    [sortAlphabetically]="false"
                    [itemSelected]="conditionForm.value.operator"
                    [placeholder]="'CDSCanvas.SelectOperator' | translate"
                    (onSelected)="onClickOperator($event)">
                </cds-select>
            </div>
        </section>
        <section class="value" formGroupName="operand2" *ngIf="canShowOperand2">
            <div>{{'CDSCanvas.Value' | translate }}</div>
            <div class="value-wrp">
                <cds-textarea id="operand2"
                    [textLimitBtn]="false"
                    [emojiPikerBtn]="false"
                    [setAttributeBtn]="setAttributeBtnOperand2"
                    [minRow]="1" [maxRow]="1"
                    [readonly]="readonlyTextarea"
                    [control]="conditionForm.value.operand2.type=='const'? conditionForm.get('operand2.value'): conditionForm.get('operand2.name')"
                    (selectedAttribute)="onSelectedAttribute($event,1)"
                    (clearSelectedAttribute)="onClearSelectedAttribute()"
                    (changeTextarea)="onChangeTextArea($event)">
                </cds-textarea>
            </div>
        </section>
        <section class="submit">
            <button class="btn btn-primary pull-right cds-blue-button" [disabled]="disableSubmit || !conditionForm.value.operator" type="submit">{{'CDSCanvas.ApplyCondition' | translate }}</button>
        </section>
    </form>
</div>
