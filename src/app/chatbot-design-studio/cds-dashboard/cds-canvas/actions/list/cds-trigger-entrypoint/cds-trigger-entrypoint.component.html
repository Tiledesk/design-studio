<div class="trigger-entrypoint">
  <div class="te-title">{{ 'CDSCanvas.Triggers' | translate }}</div>

  <div class="te-auth" *ngFor="let g of availableGroups">
    <img class="te-icon" *ngIf="g.icon" [src]="g.icon" alt="">
    <div class="te-auth-info">
      <span class="te-auth-name ellips">{{ g.name }}</span>
      <span class="te-auth-email ellips" *ngIf="authByGroup[g.id] && emailByGroup[g.id]">{{ emailByGroup[g.id] }}</span>
    </div>
    <span class="te-auth-ok" *ngIf="authByGroup[g.id]">{{ 'CDSCanvas.Connected' | translate }}</span>
    <button class="te-auth-btn ghost" *ngIf="authByGroup[g.id]" (click)="onConnect(g, true)">{{ 'CDSCanvas.ChangeAccount' | translate }}</button>
    <button class="te-auth-btn" *ngIf="!authByGroup[g.id]" (click)="onConnect(g)">{{ 'CDSCanvas.Connect' | translate }}</button>
  </div>

  <div class="te-add" *ngIf="availableSelectItems.length">
    <cds-select class="te-add-select"
        [items]="availableSelectItems"
        [itemSelected]="selectedRef"
        [bindLabelSelect]="'label'"
        [bindValueSelect]="'value'"
        [groupByKey]="'group'"
        [placeholder]="('CDSCanvas.AddTrigger' | translate)"
        [searchable]="true"
        [clearable]="false"
        (onSelected)="onSelectTrigger($event)">
    </cds-select>
    <button class="te-add-btn" [disabled]="!selectedRef" (click)="onAddSelected()">{{ 'CDSCanvas.Add' | translate }}</button>
  </div>

  <div class="te-row" *ngFor="let sub of subs">
    <div class="te-head">
      <img class="te-icon" *ngIf="sub.icon" [src]="sub.icon" alt="">
      <span class="te-name">{{ sub.name }}</span>
      <button class="te-remove" (click)="onRemove(sub)">&#x2715;</button>
    </div>
    <div class="te-field" *ngFor="let input of sub.inputs">
      <label>{{ input.name }}<span *ngIf="input.required" class="req"> *</span></label>
      <input type="text" [value]="sub.filters[input.id] || ''"
             (input)="onFilterChange(sub, input.id, $any($event.target).value)" (blur)="onSaveFilters(sub)">
    </div>
  </div>
  <div class="te-empty" *ngIf="subs.length === 0">{{ 'CDSCanvas.NoTriggers' | translate }}</div>
</div>
