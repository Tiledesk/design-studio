<div *ngIf="metadata.src && !previewMode" class="content-frame" [class.frame-preview]="showChrome"
     [style.height]="showChrome && metadata.height ? metadata.height : null">
    <div class="frame-toolbar" *ngIf="showChrome">
        <span class="frame-dots"><span></span><span></span><span></span></span>
        <span class="frame-url">{{ metadata.src }}</span>
        <button type="button"
                class="frame-close"
                title="Close preview"
                (click)="onDeletePathElement($event)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/></svg>
        </button>
    </div>
    <div class="frame-body">
        <iframe
            id="contentFrame"
            #iframe allowfullscreen
            scrolling="no"
            style= "border:none;"
            [width]="widthElement"
            [height]="heightElement"
            [src]="sanitizerUrl()">
        </iframe>
        <span class="frame-overlay" *ngIf="showChrome"></span>
        <span class="frame-badge" *ngIf="showChrome">
            <svg class="i" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h18v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M3 7l3-4h12l3 4"/></svg>
            live preview
        </span>
        <!-- <div class="control-button delete" (click)="onDeletePathElement()">
            <em class="material-icons">clear</em>
        </div> -->
    </div>
</div>
<div *ngIf="!previewMode" class="response-frame-panel">
    <div class="row-upload">
        <div class="response-image-uploader-overlay">
    
            <div class="form-group">
                <label *ngIf="!metadata.src" class="control-label">
                    {{ 'CDSCanvas.AddPath' | translate }}
                </label>
                <cds-textarea 
                    #pathTextarea
                    class="text-editable-div"
                    [text]="pathElement" 
                    [minRow]="1" [maxRow]="5"
                    [emojiPikerBtn]="false"
                    (blur)="onBlur($event)"
                    (changeTextarea)="onChangeTextArea($event)">
                </cds-textarea>
            </div> 
    
            <button
                type="button" 
                class="btn btn-primary cds-blue-button" 
                (click)="onLoadPathElement()">
                {{ 'CDSCanvas.LoadFrame' | translate }}
            </button>
        </div>
    </div>
    
    <!-- <div class="row-dimension">
    
        <div class="row-info">
            <span class="control-label">{{ 'width' | translate }}:</span>
            <input [(ngModel)] = "widthElement" type="text" class="input ng-untouched ng-pristine ng-valid">
        </div>
        <div class="row-info">
            <span class="control-label">{{ 'height' | translate }}:</span>
            <input [(ngModel)] = "heightElement" type="text" class="input ng-untouched ng-pristine ng-valid">
        </div>
    
    
    </div> -->
</div>

<div *ngIf="previewMode" class="preview-mode-wrapper">
    <div class="icon-wrapper" matTooltipClass="custom-mat-tooltip" matTooltip="{{'Frame' | translate}}" #tooltip="matTooltip" matTooltipPosition='below' matTooltipHideDelay="100">
        <img class="active-icon" src="assets/images/action-reply-types/file.svg"/>
    </div>
    <div class="response-wrp">{{metadata.src}}</div>
</div>
