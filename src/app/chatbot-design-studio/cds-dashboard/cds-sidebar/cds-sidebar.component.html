<nav class="rail">

  <!-- Blocks -->
  <div class="rail-btn"
       id="cds-sb-intents"
       matTooltipClass="cds-mat-tooltip"
       matTooltip="{{ 'Blocks' | translate }}"
       matTooltipPosition="right"
       matTooltipHideDelay="100"
       [routerLink]="['blocks']"
       routerLinkActive="active">
    <svg class="i i-lg" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
  </div>

  <!-- Rules -->
  <div *ngIf="showRulesButton || isRulesRouteActive"
       class="rail-btn"
       id="cds-sb-rules"
       matTooltipClass="cds-mat-tooltip"
       matTooltip="{{ 'Rules' | translate }}"
       matTooltipPosition="right"
       matTooltipHideDelay="100"
       [routerLink]="['rules']"
       routerLinkActive="active">
    <svg class="i i-lg" viewBox="0 0 24 24"><path d="M3 3v6a4 4 0 0 0 4 4h10"/><path d="M14 9l3 4-3 4"/><path d="M21 21V3"/></svg>
  </div>

  <!-- Globals -->
  <div class="rail-btn"
       id="cds-sb-globals"
       matTooltipClass="cds-mat-tooltip"
       matTooltip="{{ 'Globals' | translate }}"
       matTooltipPosition="right"
       matTooltipHideDelay="100"
       [routerLink]="['globals']"
       routerLinkActive="active">
    <svg class="i i-lg" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
  </div>

  <!-- Publish History -->
  <div class="rail-btn"
       id="cds-sb-history"
       matTooltipClass="cds-mat-tooltip"
       matTooltip="{{ 'ReleaseHistory' | translate }}"
       matTooltipPosition="right"
       matTooltipHideDelay="100"
       [routerLink]="['publish-history']"
       routerLinkActive="active">
    <svg class="i i-lg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
  </div>

  <div class="rail-spacer"></div>

       id="cds-sb-settings"
       matTooltipClass="cds-mat-tooltip"
       matTooltip="{{ 'Settings' | translate }}"
       matTooltipPosition="right"
       matTooltipHideDelay="100"
       [routerLink]="['settings']"

    <svg class="i i-lg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>

  <!-- Help/Support -->
  <div class="rail-btn"
       id="cds-sb-support"
       matTooltipClass="cds-mat-tooltip"
       matTooltip="{{ 'HelpCenter' | translate }}"
       matTooltipPosition="right"
       matTooltipHideDelay="100"
       [matMenuTriggerFor]="menuSupport">
    <svg class="i i-lg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
  </div>

</nav>

<!-- SIDEBAR MENU OPTIONS -->
<mat-menu #menuSupport="matMenu" class="menuElementSupport" xPosition="before">
  <ng-template matMenuContent>
    <cds-menu
      [items]="INFO_MENU_ITEMS"
      [menuType]="'sidebar'"
      (onMenuOption)="onMenuOptionFN($event)">
    </cds-menu>
  </ng-template>
</mat-menu>
