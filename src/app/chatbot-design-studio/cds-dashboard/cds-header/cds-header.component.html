<div class="topbar-left">

  <!-- Back / logo menu -->
  <button class="icon-btn"
          aria-label="Back"
          [matMenuTriggerFor]="menu">
    <svg class="i" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
  </button>

  <!-- Brand -->
  <div class="brand">
    <div class="brand-mark">{{ (BRAND_BASE_INFO['COMPANY_NAME'] + '').charAt(0) || 'T' }}</div>
    <div class="brand-name">
      {{ BRAND_BASE_INFO['COMPANY_NAME'] }}<span class="dim"> / {{ BRAND_BASE_INFO['META_TITLE'] }}</span>
    </div>
  </div>

  <!-- Breadcrumb chatbot -->
  <div class="crumb" *ngIf="selectedChatbot">
    <span class="sep">/</span>
    <span class="here">
      {{ selectedChatbot?.name }}
      <span *ngIf="(SHARE_MENU_ITEMS | filter:{key:'status',value:'active'}).length > 0"
            class="share-trigger"
            [matMenuTriggerFor]="menuShare">
        <svg class="i i-sm" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
      </span>
    </span>
    <span class="draft-pill" *ngIf="selectedChatbot?.modified">Draft</span>
  </div>

</div>

<!-- Center tool tabs -->
<div class="center-tools" role="tablist" *ngIf="isBlockSectionActive">
  <button class="tool-tab active">{{ 'Editor' | translate }}</button>
  <button class="tool-tab"
          *ngIf="!isWebhook"
          [class.active]="isPlaying"
          (click)="isPlaying ? onCloseTestItOut() : onOpenTestItOut()">
    {{ 'TestIt' | translate }}
  </button>
</div>
<div class="center-tools" *ngIf="!isBlockSectionActive"></div>

<div class="topbar-right">

  <!-- Webhook URL (solo se attivo) -->
  <div *ngIf="webhookUrl && isPlaying && isWebhook"
       class="ghost-btn box-url"
       matTooltipClass="cds-mat-tooltip"
       matTooltip="{{ 'Copy Dev url' | translate }}"
       #tooltip="matTooltip"
       matTooltipPosition="below"
       matTooltipHideDelay="100"
       (click)="copyText(true)">
    <span class="span-url ellips">{{ webhookUrl }}</span>
    <div *ngIf="messageWebhookUrl !== ''" class="webhook-message fade-in-out">
      <span>{{ messageWebhookUrl }}</span>
    </div>
  </div>

  <!-- Try on WhatsApp -->
  <button *ngIf="TRY_ON_WA === true && isBlockSectionActive && !isWebhook && !isPlaying"
          id="cds-test-it-wab-out-btn"
          class="ghost-btn"
          type="button"
          (click)="openWhatsappPage()">
    <img width="16px" height="16px" src="assets/images/channel_icons/whatsapp-logo_green.svg">
    {{ 'TryOnWhatsapp' | translate }}
  </button>

  <!-- Share -->
  <button *ngIf="(SHARE_MENU_ITEMS | filter:{key:'status',value:'active'}).length > 0"
          class="ghost-btn"
          [matMenuTriggerFor]="menuShare">
    {{ 'Share' | translate }}
  </button>

  <!-- Divider -->
  <div class="topbar-divider" *ngIf="isBlockSectionActive"></div>

  <!-- Test It Out play/stop icon-btn -->
  <button *ngIf="isBlockSectionActive"
          id="cds-test-it-out-btn"
          class="icon-btn"
          type="button"
          [class.icon-btn--active]="isPlaying"
          (click)="isPlaying ? onCloseTestItOut() : onOpenTestItOut()">
    <mat-icon *ngIf="!isPlaying" svgIcon="play" aria-hidden="true"></mat-icon>
    <mat-icon *ngIf="isPlaying" svgIcon="stop" aria-hidden="true"></mat-icon>
  </button>

  <!-- Publish split btn -->
  <div *ngIf="isBlockSectionActive"
       class="split-btn"
       id="cds-publish-btn-wrp"
       [ngStyle]="{'z-index': popup_visibility === 'block' ? '1051' : '1'}">
    <button *ngIf="(!isPlaying && isWebhook) || !isWebhook"
            id="cds-publish-btn"
            class="split-btn__main"
            type="button"
            (click)="onClickPublish()">
      <svg class="i" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3" fill="currentColor"/></svg>
      {{ 'Publish' | translate }}
      <span *ngIf="selectedChatbot?.modified"
            class="publish-badge"
            [matTooltip]="'CDSHeader.ThereAreUnpublishedChanges' | translate"
            matTooltipClass="cds-mat-tooltip"
            matTooltipPosition="below"
            matTooltipHideDelay="100">
      </span>
    </button>
    <span class="split-btn__sep"></span>
    <button class="split-btn__arrow" [matMenuTriggerFor]="menuPlay">
      <svg class="i i-sm" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
    </button>
  </div>

</div>


<!-- HEADER MENU OPTIONS-->
<mat-menu #menu="matMenu" class="menuElement" xPosition="after">
  <ng-template matMenuContent>
    <cds-menu [items]="LOGO_MENU_ITEMS" (onMenuOption)="onMenuOptionFN($event)"></cds-menu>
  </ng-template>
</mat-menu>

<!-- SHARE MENU OPTIONS -->
<mat-menu #menuShare="matMenu" class="menuElement shareMenu" xPosition="after" yPosition="below">
  <ng-template matMenuContent>
    <cds-menu
      [items]="SHARE_MENU_ITEMS"
      [menuType]="''"
      [menuTitle]="'SharePrototype' | translate"
      (onMenuOption)="onMenuOptionFN($event)">
    </cds-menu>
  </ng-template>
</mat-menu>

<!-- PLAY MENU OPTIONS-->
<mat-menu #menuPlay="matMenu" class="menuElement playMenu" xPosition="after" yPosition="below">
  <ng-template matMenuContent>
    <cds-menu [items]="PLAY_MENU_ITEMS" [menuType]="''" (onMenuOption)="onMenuOptionFN($event)"></cds-menu>
  </ng-template>
</mat-menu>
