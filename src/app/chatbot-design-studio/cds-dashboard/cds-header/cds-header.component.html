<div class="topbar-left">

  <!-- Back / logo menu -->
  <button class="icon-btn"
          aria-label="Back"
          [matMenuTriggerFor]="menu">
    <svg class="i" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
  </button>

  <!-- Brand -->
  <div class="brand">
    <div class="brand-mark">{{ (BRAND_BASE_INFO['COMPANY_NAME'] + '').charAt(0) || 'T' }}</div>
    <div class="brand-name">
      {{ BRAND_BASE_INFO['COMPANY_NAME'] }}<span class="dim"> / {{ BRAND_BASE_INFO['META_TITLE'] }}</span>
    </div>
  </div>

  <!-- Breadcrumb chatbot -->
  <div class="crumb" *ngIf="selectedChatbot">
    <span class="sep">/</span>
    <span class="here">
      {{ selectedChatbot?.name }}
      <!-- Chevron disabled: future hook for chatbot switcher -->
      <span class="share-trigger share-trigger--disabled" aria-disabled="true">
        <svg class="i i-sm" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
      </span>
    </span>
  </div>

</div>

<!-- Center area intentionally empty: TestIt / Editor toggles removed. -->
<div class="center-tools"></div>

<div class="topbar-right">

  <!-- Webhook URL (solo se attivo) -->
  <div *ngIf="webhookUrl && isPlaying && isWebhook"
       class="ghost-btn box-url"
       matTooltipClass="cds-mat-tooltip"
       matTooltip="{{ 'Copy Dev url' | translate }}"
       #tooltip="matTooltip"
       matTooltipPosition="below"
       matTooltipHideDelay="100"
       (click)="copyText(true)">
    <span class="span-url ellips">{{ webhookUrl }}</span>
    <div *ngIf="messageWebhookUrl !== ''" class="webhook-message fade-in-out">
      <span>{{ messageWebhookUrl }}</span>
    </div>
  </div>

  <!-- Try on WhatsApp -->
  <button *ngIf="isBlockSectionActive && !isWebhook && !isPlaying"
          id="cds-test-it-wab-out-btn"
          class="wa-btn"
          type="button"
          (click)="openWhatsappPage()">
    <svg class="wa-icon" viewBox="0 0 32 32" aria-hidden="true">
      <path fill="currentColor" d="M19.11 17.21c-.27-.13-1.59-.78-1.84-.87-.25-.09-.43-.13-.61.14-.18.27-.7.87-.86 1.05-.16.18-.32.2-.59.07-.27-.13-1.13-.41-2.16-1.33-.8-.71-1.34-1.59-1.5-1.86-.16-.27-.02-.42.12-.55.12-.12.27-.32.41-.48.13-.16.18-.27.27-.45.09-.18.05-.34-.02-.47-.07-.13-.61-1.47-.84-2.02-.22-.53-.45-.46-.61-.47-.16-.01-.34-.01-.52-.01s-.47.07-.72.34c-.25.27-.95.93-.95 2.27 0 1.34.98 2.64 1.12 2.82.13.18 1.93 2.96 4.69 4.16.66.28 1.17.45 1.57.58.66.21 1.26.18 1.74.11.53-.08 1.59-.65 1.81-1.27.22-.62.22-1.16.16-1.27-.07-.11-.25-.18-.52-.31zM16 6.5c-5.24 0-9.5 4.26-9.5 9.5 0 1.67.44 3.31 1.27 4.74L6 26l5.36-1.4c1.39.76 2.95 1.16 4.55 1.16h.01c5.24 0 9.5-4.26 9.5-9.5S21.24 6.5 16 6.5z"/>
    </svg>
    {{ 'TryOnWhatsapp' | translate }}
  </button>

  <!-- Share -->
  <button *ngIf="(SHARE_MENU_ITEMS | filter:{key:'status',value:'active'}).length > 0"
          class="ghost-btn ghost-btn--menu"
          [matMenuTriggerFor]="menuShare">
    <svg class="i i-sm" viewBox="0 0 24 24"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
    {{ 'Share' | translate }}
    <svg class="i i-sm chev" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
  </button>

  <!-- Divider -->
  <div class="topbar-divider" *ngIf="isBlockSectionActive"></div>

  <!-- Test It Out play/stop icon-btn (primary) -->
  <button *ngIf="isBlockSectionActive"
          id="cds-test-it-out-btn"
          class="icon-btn icon-btn--primary"
          type="button"
          [class.icon-btn--active]="isPlaying"
          (click)="isPlaying ? onCloseTestItOut() : onOpenTestItOut()">
    <svg *ngIf="!isPlaying" class="i-play" viewBox="0 0 24 24" aria-hidden="true">
      <polygon points="8,5 8,19 19,12" fill="currentColor"/>
    </svg>
    <svg *ngIf="isPlaying" class="i-play" viewBox="0 0 24 24" aria-hidden="true">
      <rect x="6" y="5" width="4" height="14" fill="currentColor"/>
      <rect x="14" y="5" width="4" height="14" fill="currentColor"/>
    </svg>
  </button>

  <!-- Publish (direct, no dropdown menu) -->
  <button *ngIf="isBlockSectionActive && ((!isPlaying && isWebhook) || !isWebhook)"
          id="cds-publish-btn"
          class="publish-btn"
          type="button"
          (click)="onClickPublish()">
    <svg class="i" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3" fill="currentColor"/></svg>
    {{ 'Publish' | translate }}
    <span *ngIf="selectedChatbot?.modified"
          class="publish-badge"
          [matTooltip]="'CDSHeader.ThereAreUnpublishedChanges' | translate"
          matTooltipClass="cds-mat-tooltip"
          matTooltipPosition="below"
          matTooltipHideDelay="100">
    </span>
  </button>

</div>


<!-- HEADER MENU OPTIONS-->
<mat-menu #menu="matMenu" class="menuElement" xPosition="after">
  <ng-template matMenuContent>
    <cds-menu [items]="LOGO_MENU_ITEMS" (onMenuOption)="onMenuOptionFN($event)"></cds-menu>
  </ng-template>
</mat-menu>

<!-- SHARE MENU OPTIONS -->
<mat-menu #menuShare="matMenu" class="menuElement shareMenu" xPosition="after" yPosition="below">
  <ng-template matMenuContent>
    <cds-menu
      [items]="SHARE_MENU_ITEMS"
      [menuType]="''"
      [menuTitle]="'SharePrototype' | translate"
      (onMenuOption)="onMenuOptionFN($event)">
    </cds-menu>
  </ng-template>
</mat-menu>

<!-- PLAY MENU removed: Publish is now a direct action button. -->
